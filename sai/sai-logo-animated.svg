<svg viewBox="-10 -10 147 62" xmlns="http://www.w3.org/2000/svg" aria-label="SAI logo">
  <defs>
    <style>
      /* Default (Light Mode) */
      :root {
        --accent-color: rgb(0, 90, 169);     /* #005aa9 */
        --logo-secondary: #909094;           /* Mono bright gray for C/D variant */
        --svg-text: #1a1a2e;                 /* Dark text for light mode */
        --wave-color: var(--accent-color);
        color: var(--wave-color);
      }

      /* Dark Mode */
      @media (prefers-color-scheme: dark) {
        :root {
          --logo-secondary: #b8b8bc;         /* Brighter gray for dark mode */
          --svg-text: #ffffff;               /* White text for dark mode */
          --wave-color: var(--accent-color);
          color: var(--wave-color);
        }
      }

      .edge-accent {
        stroke: var(--accent-color);
        stroke-width: 1.5;
        stroke-linecap: round;
      }
      .acc-fill {
        fill: var(--accent-color);
      }
      .sec-fill {
        fill: var(--logo-secondary);
      }
      .edge-secondary {
        stroke: var(--logo-secondary);
        stroke-width: 1.5;
        stroke-linecap: round;
      }
      .hex-accent {
        fill: none;
        stroke: var(--accent-color);
        stroke-width: 3;
      }
      .wordmark {
        fill: var(--svg-text);
        font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        font-weight: 300;
        font-size: 12px;
      }
      path.flow-wave {
        stroke: var(--wave-color);
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 40 160;
        stroke-dashoffset: 40;
        animation: sweepWave 2.4s linear infinite;
      }
      path.flow-wave-tail {
        stroke: var(--wave-color);
        stroke-width: 1.25;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 80 160;
        stroke-dashoffset: 80;
        mask: url(#tail-mask);
        -webkit-mask: url(#tail-mask);
        animation: sweepTail 2.4s linear infinite;
      }
      @keyframes sweepWave {
        0% { stroke-dashoffset: 40; opacity: 0; }
        10% { opacity: 1; }
        85% { opacity: 1; }
        100% { stroke-dashoffset: -100; opacity: 0; }
      }
      @keyframes sweepTail {
        0% { stroke-dashoffset: 80; opacity: 0; }
        10% { opacity: 0.8; }
        85% { opacity: 0.8; }
        100% { stroke-dashoffset: -60; opacity: 0; }
      }
      .wave-fill {
        fill: var(--wave-color);
        opacity: 0;
        animation: hexWave 2.4s linear infinite;
      }
      .wave-stroke {
        fill: none;
        stroke: var(--wave-color);
        stroke-width: 3;
        opacity: 0;
        animation: hexWave 2.4s linear infinite;
      }
      @keyframes hexWave {
        0% { opacity: 0; }
        5% { opacity: 1; }
        20% { opacity: 1; }
        30% { opacity: 0; }
        100% { opacity: 0; }
      }
    </style>

    <clipPath id="tc"><polygon points="21,1 26.20,4 26.20,10 21,13 15.80,10 15.80,4" /></clipPath>
    <clipPath id="tr"><polygon points="35,1 40.20,4 40.20,10 35,13 29.80,10 29.80,4" /></clipPath>
    <clipPath id="lc"><polygon points="7,15 12.20,18 12.20,24 7,27 1.80,24 1.80,18" /></clipPath>
    <clipPath id="c"><polygon points="21,15 26.20,18 26.20,24 21,27 15.80,24 15.80,18" /></clipPath>
    <clipPath id="rc"><polygon points="35,15 40.20,18 40.20,24 35,27 29.80,24 29.80,18" /></clipPath>
    <clipPath id="bl"><polygon points="7,29 12.20,32 12.20,38 7,41 1.80,38 1.80,32" /></clipPath>
    <clipPath id="br"><polygon points="35,29 40.20,32 40.20,38 35,41 29.80,38 29.80,32" /></clipPath>
    
    <clipPath id="dot-clip">
      <path clip-rule="evenodd" d="M-10,-10 h157 v72 h-157 z
        M 21,1 L 26.20,4 L 26.20,10 L 21,13 L 15.80,10 L 15.80,4 Z
        M 35,1 L 40.20,4 L 40.20,10 L 35,13 L 29.80,10 L 29.80,4 Z
        M 7,15 L 12.20,18 L 12.20,24 L 7,27 L 1.80,24 L 1.80,18 Z
        M 21,15 L 26.20,18 L 26.20,24 L 21,27 L 15.80,24 L 15.80,18 Z
        M 35,15 L 40.20,18 L 40.20,24 L 35,27 L 29.80,24 L 29.80,18 Z
      " />
    </clipPath>
    <radialGradient id="flow-grad" cx="50%" cy="50%" r="90%">
      <stop offset="60%" stop-color="var(--wave-color)" stop-opacity="1" />
      <stop offset="100%" stop-color="var(--wave-color)" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="tail-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="100%" stop-color="white" stop-opacity="1" />
    </linearGradient>
    <mask id="tail-mask">
      <rect width="100%" height="100%" fill="url(#tail-fade)" />
    </mask>
  </defs>

  <line x1="10.80" y1="10.80" x2="17.20" y2="17.20" class="edge-secondary" />
  <line x1="24.80" y1="17.20" x2="31.20" y2="10.80" class="edge-secondary" />
  <line x1="35" y1="13" x2="35" y2="15" class="edge-secondary" />
  <line x1="31.20" y1="24.80" x2="24.80" y2="31.20" class="edge-secondary" />

  <line x1="26.20" y1="7" x2="29.80" y2="7" class="edge-secondary" />
  <line x1="12.20" y1="21" x2="15.80" y2="21" class="edge-secondary" />
  <line x1="7" y1="29" x2="7" y2="27" class="edge-secondary" />
  <line x1="26.20" y1="35" x2="29.80" y2="35" class="edge-secondary" />

  <polygon points="7,1 12.20,4 12.20,10 7,13 1.80,10 1.80,4" class="sec-fill" />
  <polygon points="21,1 26.20,4 26.20,10 21,13 15.80,10 15.80,4" class="hex-secondary" clip-path="url(#tc)" />
  <polygon points="35,1 40.20,4 40.20,10 35,13 29.80,10 29.80,4" class="hex-secondary" clip-path="url(#tr)" />
  <polygon points="7,15 12.20,18 12.20,24 7,27 1.80,24 1.80,18" class="hex-secondary" clip-path="url(#lc)" />
  <polygon points="21,15 26.20,18 26.20,24 21,27 15.80,24 15.80,18" class="hex-secondary" clip-path="url(#c)" />
  <polygon points="35,15 40.20,18 40.20,24 35,27 29.80,24 29.80,18" class="hex-secondary" clip-path="url(#rc)" />
  <polygon points="7,29 12.20,32 12.20,38 7,41 1.80,38 1.80,32" class="hex-secondary" clip-path="url(#bl)" />
  <polygon points="21,29 26.20,32 26.20,38 21,41 15.80,38 15.80,32" class="sec-fill" />
  <polygon points="35,29 40.20,32 40.20,38 35,41 29.80,38 29.80,32" class="hex-secondary" clip-path="url(#br)" />

  <!-- Flow of knowledge animation -->
  <g class="wave-layer">
    <path d="M 7,7 L 21,21 L 35,7 L 35,21 L 21,35" class="flow-wave-tail" />
    <path d="M 7,7 L 21,21 L 35,7 L 35,21 L 21,35" class="flow-wave" />
    <polygon points="7,1 12.20,4 12.20,10 7,13 1.80,10 1.80,4" class="wave-fill" style="animation-delay: 0s; fill: url(#flow-grad)" />
    <polygon points="21,15 26.20,18 26.20,24 21,27 15.80,24 15.80,18" class="wave-stroke" clip-path="url(#c)" style="animation-delay: 0.34s; stroke: url(#flow-grad)" />
    <polygon points="35,1 40.20,4 40.20,10 35,13 29.80,10 29.80,4" class="wave-stroke" clip-path="url(#tr)" style="animation-delay: 0.68s; stroke: url(#flow-grad)" />
    <polygon points="35,15 40.20,18 40.20,24 35,27 29.80,24 29.80,18" class="wave-stroke" clip-path="url(#rc)" style="animation-delay: 1.02s; stroke: url(#flow-grad)" />
    <polygon points="21,29 26.20,32 26.20,38 21,41 15.80,38 15.80,32" class="wave-fill" style="animation-delay: 1.37s; fill: url(#flow-grad)" />
  </g>

  <line x1="49" y1="1" x2="49" y2="41" class="divider" />

  <text x="55" y="9.6" class="wordmark">Structural</text>
  <text x="55" y="24" class="wordmark">Analysis</text>
  <text x="55" y="38.4" class="wordmark">Intelligence</text>
</svg>
