<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1275 500"
     width="1275" height="500" aria-label="SAI Logo - Variant D - light - color - animated">
  <defs>
    <radialGradient id="flow-grad" cx="50%" cy="50%" r="90%">
      <stop offset="60%" stop-color="#005AA9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#005AA9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tail-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="tail-mask">
      <rect width="100%" height="100%" fill="url(#tail-fade)"/>
    </mask>
    <mask id="hex-hole-mask">
      <rect x="-50%" y="-50%" width="200%" height="200%" fill="white"/>
      <polygon points="7,1 12.20,4 12.20,10 7,13 1.80,10 1.80,4" fill="black"/>
      <polygon points="21,1 26.20,4 26.20,10 21,13 15.80,10 15.80,4" fill="black"/>
      <polygon points="35,1 40.20,4 40.20,10 35,13 29.80,10 29.80,4" fill="black"/>
      <polygon points="7,15 12.20,18 12.20,24 7,27 1.80,24 1.80,18" fill="black"/>
      <polygon points="21,15 26.20,18 26.20,24 21,27 15.80,24 15.80,18" fill="black"/>
      <polygon points="35,15 40.20,18 40.20,24 35,27 29.80,24 29.80,18" fill="black"/>
      <polygon points="7,29 12.20,32 12.20,38 7,41 1.80,38 1.80,32" fill="black"/>
      <polygon points="21,29 26.20,32 26.20,38 21,41 15.80,38 15.80,32" fill="black"/>
      <polygon points="35,29 40.20,32 40.20,38 35,41 29.80,38 29.80,32" fill="black"/>
    </mask>
    <style>
      @keyframes sweepWave {
        0%   { stroke-dashoffset: 156; opacity: 0; }
        1%   { opacity: 1; }
        80%  { stroke-dashoffset: -204; opacity: 1; }
        100% { stroke-dashoffset: -204; opacity: 0; }
      }
      @keyframes sweepTail {
        0%   { stroke-dashoffset: 216; opacity: 0; }
        1%   { opacity: 1; }
        80%  { stroke-dashoffset: -144; opacity: 1; }
        100% { stroke-dashoffset: -144; opacity: 0; }
      }
      @keyframes hexWave {
        0%   { opacity: 0; }
        4%   { opacity: 1; }
        30%  { opacity: 1; }
        38%  { opacity: 0; }
        100% { opacity: 0; }
      }
      .flow-wave {
        stroke: #005AA9; stroke-width: 1.5;
        stroke-linecap: round; stroke-linejoin: round; fill: none;
        stroke-dasharray: 156 500; stroke-dashoffset: 156;
        animation: sweepWave 4.5s linear infinite;
      }
      .flow-wave-tail {
        stroke: #005AA9; stroke-width: 1.25;
        stroke-linecap: round; stroke-linejoin: round; fill: none;
        stroke-dasharray: 216 500; stroke-dashoffset: 216;
        mask: url(#tail-mask);
        animation: sweepTail 4.5s linear infinite;
      }
      .wave-fill {
        fill: #005AA9;
        animation: hexWave 4.5s linear infinite; opacity: 0;
      }
      .wave-stroke {
        fill: none; stroke: #005AA9; stroke-width: 3;
        animation: hexWave 4.5s linear infinite; opacity: 0;
      }
    </style>
  </defs>

  <g transform="translate(138.75,118.75) scale(6.2500)">
    <defs>
      <clipPath id="TC"><polygon points="21,1 26.20,4 26.20,10 21,13 15.80,10 15.80,4"/></clipPath>
      <clipPath id="TR"><polygon points="35,1 40.20,4 40.20,10 35,13 29.80,10 29.80,4"/></clipPath>
      <clipPath id="LC"><polygon points="7,15 12.20,18 12.20,24 7,27 1.80,24 1.80,18"/></clipPath>
      <clipPath id="C"><polygon points="21,15 26.20,18 26.20,24 21,27 15.80,24 15.80,18"/></clipPath>
      <clipPath id="RC"><polygon points="35,15 40.20,18 40.20,24 35,27 29.80,24 29.80,18"/></clipPath>
      <clipPath id="BL"><polygon points="7,29 12.20,32 12.20,38 7,41 1.80,38 1.80,32"/></clipPath>
      <clipPath id="BR"><polygon points="35,29 40.20,32 40.20,38 35,41 29.80,38 29.80,32"/></clipPath>
    </defs>
    <line x1="10.8" y1="10.8" x2="17.2" y2="17.2" stroke="#909094" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24.8" y1="17.2" x2="31.2" y2="10.8" stroke="#909094" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="35" y1="13" x2="35" y2="15" stroke="#909094" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="31.2" y1="24.8" x2="24.8" y2="31.2" stroke="#909094" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="26.2" y1="7" x2="29.8" y2="7" stroke="#909094" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12.2" y1="21" x2="15.8" y2="21" stroke="#909094" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="29" x2="7" y2="27" stroke="#909094" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="26.2" y1="35" x2="29.8" y2="35" stroke="#909094" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="7,1 12.20,4 12.20,10 7,13 1.80,10 1.80,4" fill="#909094"/>
    <polygon points="21,1 26.20,4 26.20,10 21,13 15.80,10 15.80,4" fill="none" stroke="#909094" stroke-width="3" clip-path="url(#TC)"/>
    <polygon points="35,1 40.20,4 40.20,10 35,13 29.80,10 29.80,4" fill="none" stroke="#909094" stroke-width="3" clip-path="url(#TR)"/>
    <polygon points="7,15 12.20,18 12.20,24 7,27 1.80,24 1.80,18" fill="none" stroke="#909094" stroke-width="3" clip-path="url(#LC)"/>
    <polygon points="21,15 26.20,18 26.20,24 21,27 15.80,24 15.80,18" fill="none" stroke="#909094" stroke-width="3" clip-path="url(#C)"/>
    <polygon points="35,15 40.20,18 40.20,24 35,27 29.80,24 29.80,18" fill="none" stroke="#909094" stroke-width="3" clip-path="url(#RC)"/>
    <polygon points="7,29 12.20,32 12.20,38 7,41 1.80,38 1.80,32" fill="none" stroke="#909094" stroke-width="3" clip-path="url(#BL)"/>
    <polygon points="35,29 40.20,32 40.20,38 35,41 29.80,38 29.80,32" fill="none" stroke="#909094" stroke-width="3" clip-path="url(#BR)"/>
    <polygon points="21,29 26.20,32 26.20,38 21,41 15.80,38 15.80,32" fill="#909094"/>
    <g mask="url(#hex-hole-mask)">
      <path d="M 7,7 L 21,21 L 35,7 L 35,21 L 21,35" class="flow-wave-tail"/>
      <path d="M 7,7 L 21,21 L 35,7 L 35,21 L 21,35" class="flow-wave"/>
    </g>
    <polygon points="7,1 12.20,4 12.20,10 7,13 1.80,10 1.80,4" class="wave-fill" style="animation-delay:0.0s; fill:url(#flow-grad)"/>
    <polygon points="21,29 26.20,32 26.20,38 21,41 15.80,38 15.80,32" class="wave-fill" style="animation-delay:0.73s; fill:url(#flow-grad)"/>
    <polygon points="21,15 26.20,18 26.20,24 21,27 15.80,24 15.80,18" class="wave-stroke" clip-path="url(#C)" style="animation-delay:0.2s; stroke:url(#flow-grad)"/>
    <polygon points="35,1 40.20,4 40.20,10 35,13 29.80,10 29.80,4" class="wave-stroke" clip-path="url(#TR)" style="animation-delay:0.4s; stroke:url(#flow-grad)"/>
    <polygon points="35,15 40.20,18 40.20,24 35,27 29.80,24 29.80,18" class="wave-stroke" clip-path="url(#RC)" style="animation-delay:0.54s; stroke:url(#flow-grad)"/>
  </g>

  <rect x="457.07" y="125" width="5.5" height="250" fill="#1a1a2e"/>

  <text x="507.1" y="189.37" fill="#1a1a2e" font-family="Poppins, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-weight="300" font-size="80">Structural</text>
  <text x="507.1" y="279.37" fill="#1a1a2e" font-family="Poppins, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-weight="300" font-size="80">Analysis</text>
  <text x="507.1" y="369.37" fill="#1a1a2e" font-family="Poppins, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-weight="300" font-size="80">Intelligence</text>
</svg>
